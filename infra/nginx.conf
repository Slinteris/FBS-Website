upstream app {
    server 127.0.0.1:3000;
}

server {
    listen 80;
    server_name fbsinsurance.com www.fbsinsurance.com flexiblebenefitsolutions.com www.flexiblebenefitsolutions.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name fbsinsurance.com www.fbsinsurance.com flexiblebenefitsolutions.com www.flexiblebenefitsolutions.com;

    ssl_certificate /etc/letsencrypt/live/fbsinsurance.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fbsinsurance.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;

    # React Router v7 fingerprinted assets — cache forever
    location /assets/ {
        alias /home/deploy/fbs-website/build/client/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        proxy_pass http://app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
